
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parvez Bio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
text-align:center;
padding:30px;
margin:0
}
.container{max-width:420px;margin:auto}
.profile img{width:120px;height:120px;border-radius:50%;border:4px solid white;object-fit:cover}
.name{font-size:26px;margin-top:10px;font-weight:600}
.bio{opacity:.8;margin-bottom:25px}
.links a{
display:block;
background:#1e293b;
margin:12px 0;
padding:15px;
border-radius:14px;
text-decoration:none;
color:white;
font-weight:500;
transition:.25s
}
.links a:hover{transform:scale(1.05);background:#334155}
.adminToggle{margin-top:30px;font-size:14px;opacity:.7;cursor:pointer}
.panel{display:none;margin-top:20px;background:#020617;padding:15px;border-radius:12px}
input{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none}
button{width:100%;padding:12px;border:none;border-radius:10px;background:#22c55e;color:white;font-weight:600;cursor:pointer;margin-top:5px}
.small{background:#3b82f6;margin-top:8px}
</style>
</head>
<body>

<div class="container">

<div class="profile">
<img id="profileImg" src="https://i.imgur.com/2DhmtJ4.png">
<div class="name" id="name">Gaming Parvez</div>
<div class="bio" id="bio">Free Fire Player</div>
</div>

<div class="links" id="links"></div>

<div class="adminToggle" onclick="openLogin()">⚙️ Admin</div>

<div class="panel" id="loginPanel">
<h3>Admin Login</h3>
<input id="pass" placeholder="Enter password">
<button onclick="login()">Login</button>
</div>

<div class="panel" id="adminPanel">
<h3>Edit Profile</h3>
<input id="newName" placeholder="Name">
<input id="newBio" placeholder="Bio">
<input id="newImg" placeholder="Profile Image URL">
<button onclick="updateProfile()">Update</button>

<h3 style="margin-top:20px">Add Link</h3>
<input id="title" placeholder="Button Name">
<input id="url" placeholder="Button URL">
<button onclick="addLink()">Add</button>

<button class="small" onclick="saveData()">Save All</button>
</div>

</div>

<script>
const ADMIN_PASS = "1234";

let data = JSON.parse(localStorage.getItem("bioData")) || {
name:"Gaming Parvez",
bio:"Free Fire Player",
img:"https://i.imgur.com/2DhmtJ4.png",
links:[
{title:"YouTube",url:"#"},
{title:"Facebook",url:"#"},
{title:"Instagram",url:"#"}]
}

function render(){
document.getElementById("name").innerText=data.name
document.getElementById("bio").innerText=data.bio
document.getElementById("profileImg").src=data.img

const container=document.getElementById("links")
container.innerHTML=""

data.links.forEach(l=>{
const a=document.createElement("a")
a.href=l.url
a.innerText=l.title
a.target="_blank"
container.appendChild(a)
})
}

function addLink(){
const t=document.getElementById("title").value
const u=document.getElementById("url").value
if(t && u){
data.links.push({title:t,url:u})
render()
}
}

function updateProfile(){
const n=document.getElementById("newName").value
const b=document.getElementById("newBio").value
const i=document.getElementById("newImg").value
if(n) data.name=n
if(b) data.bio=b
if(i) data.img=i
render()
}

function saveData(){
localStorage.setItem("bioData",JSON.stringify(data))
alert("Saved")
}

function openLogin(){
const p=document.getElementById("loginPanel")
p.style.display=p.style.display=="block"?"none":"block"
}

function login(){
const p=document.getElementById("pass").value
if(p===ADMIN_PASS){
document.getElementById("adminPanel").style.display="block"
document.getElementById("loginPanel").style.display="none"
}else{
alert("Wrong password")
}
}

render()
</script>

</body>
</html>
